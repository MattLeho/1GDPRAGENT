services:
  # ═══════════════════════════════════════════════════════════════════════════
  # PostgreSQL - Main Application Database
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: gdpr_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gdpr_local}
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-gdpr_local}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # N8N - Workflow Automation
  # ═══════════════════════════════════════════════════════════════════════════
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: gdpr_n8n
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-gdpr_local}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_PUBLIC_URL:-http://localhost:5678}/
    ports:
      - "${N8N_HOST_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5678/healthz/readiness').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # Neo4j - Knowledge Graph Database
  # ═══════════════════════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5-community
    container_name: gdpr_neo4j
    restart: always
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:7474" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # Qdrant - Vector Database for RAG
  # ═══════════════════════════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:latest
    container_name: gdpr_qdrant
    restart: always
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis - Task Queue and Caching
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: gdpr_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # Intelligence Service - Python AI Agents
  # ═══════════════════════════════════════════════════════════════════════════
  intelligence:
    build: ./intelligence
    container_name: gdpr_intelligence
    restart: always
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL_PRO=${GEMINI_MODEL_PRO:-gemini-3-pro-preview}
      - GEMINI_MODEL_FLASH=${GEMINI_MODEL_FLASH:-gemini-3-flash-preview}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gdpr_local}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - CREDENTIAL_KEY=${CREDENTIAL_KEY}
    ports:
      - "${INTELLIGENCE_HOST_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./intelligence:/app
      - intelligence_cache:/app/.cache
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════════
  # Celery Worker - Background Task Processing
  # ═══════════════════════════════════════════════════════════════════════════
  celery-worker:
    build: ./intelligence
    container_name: gdpr_celery
    restart: always
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL_PRO=${GEMINI_MODEL_PRO:-gemini-3-pro-preview}
      - GEMINI_MODEL_FLASH=${GEMINI_MODEL_FLASH:-gemini-3-flash-preview}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gdpr_local}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      intelligence:
        condition: service_started
    volumes:
      - ./intelligence:/app
      - intelligence_cache:/app/.cache
    command: sh -c "pip install -r requirements.txt && celery -A tasks worker -l INFO -c 4"
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME --timeout=10 | grep -q OK" ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
  # ═══════════════════════════════════════════════════════════════════════════
  # Next.js Frontend
  # ═══════════════════════════════════════════════════════════════════════════
  nextjs:
    image: node:20-alpine
    container_name: gdpr_nextjs
    restart: always
    working_dir: /app
    ports:
      - "${NEXTJS_HOST_PORT:-3001}:3000"
    environment:
      # Database (uses internal Docker hostname 'postgres')
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gdpr_local}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-gdpr_local}
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      # N8N (internal Docker URLs)
      - N8N_PUBLIC_URL=http://n8n:5678
      - N8N_INTERNAL_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY:-}
      # AI API Keys
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_MODEL_PRO=${GEMINI_MODEL_PRO:-gemini-3-pro-preview}
      - GEMINI_MODEL_FLASH=${GEMINI_MODEL_FLASH:-gemini-3-flash-preview}
      # App URLs
      - NEXT_PUBLIC_APP_URL=http://localhost:${NEXTJS_HOST_PORT:-3001}
      - INTELLIGENCE_URL=http://intelligence:8000
      # Security
      - CREDENTIAL_KEY=${CREDENTIAL_KEY}
      # N8N Webhooks (use internal Docker hostnames)
      - N8N_WEBHOOK_ANALYZE_POLICY=http://n8n:5678/webhook/analyze-policy
      - N8N_WEBHOOK_DRAFT_REQUEST=http://n8n:5678/webhook/draft-request
      - N8N_WEBHOOK_SEND_EMAIL=http://n8n:5678/webhook/send-email
      - N8N_WEBHOOK_TEST_IMAP=http://n8n:5678/webhook/test-imap
      - N8N_WEBHOOK_INGEST_DATA=http://n8n:5678/webhook/ingest-data
      - N8N_WEBHOOK_INGEST_IDENTITY=http://n8n:5678/webhook/ingest-identity
      - N8N_WEBHOOK_FILE_TRANSCRIPTION=http://n8n:5678/webhook/file-transcription
      - N8N_WEBHOOK_VENDOR_EXTRACT=http://n8n:5678/webhook/vendor-extract
      - N8N_WEBHOOK_POLICY_SCAN=http://n8n:5678/webhook/policy-scan
      - N8N_WEBHOOK_ENHANCED_RAG=http://n8n:5678/webhook/enhanced-rag
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - ./frontend:/app
      - nextjs_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      n8n:
        condition: service_started
      intelligence:
        condition: service_started
    networks:
      - gdpr-net
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  gdpr-net:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  redis_data:
  intelligence_cache:
  nextjs_node_modules:
